version: '3.8'

services:
  # 阅读书源去重校验工具
  booksource-validator:
    build:
      context: .
      dockerfile: Dockerfile
    image: booksource-validator:latest
    container_name: booksource-validator
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s